name: Docker API Scraper Workflow

on:
  schedule:
    - cron: '30 13 * * *'  # 每天台灣時間 21:30 執行
  workflow_dispatch:      # 支援手動觸發

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 登入 Docker Hub 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. 建立並推送 Docker Image 
      - name: Build and Push Docker Image
        run: |
          # 把 hsiang1119 換成你的 Docker Hub 帳號
          docker build -t ${{ secrets.DOCKER_USERNAME }}/s1111520-hw2:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/s1111520-hw2:latest

      # 3. 執行容器以獲取 JSON 資料
      - name: Run Container and Get Data
        run: |
          docker run --name scraper-container ${{ secrets.DOCKER_USERNAME }}/s1111520-hw2:latest
          docker cp scraper-container:/app/road_data.json ./road_data.json

      # 4. 將資料推回 GitHub
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add road_data.json
          git commit -m "Auto-update road data via Docker" || exit 0
          git push
